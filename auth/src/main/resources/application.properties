spring.application.name=auth

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.username=${USER_DB:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.password=${PASSWORD_DB}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:my-secret}
jwt.access-token-expiration-minutes=15
jwt.refresh-token-expiration-days=7